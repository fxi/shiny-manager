<!DOCTYPE html>
<html>
  <head>
    <title>Shiny App Manager</title>
    <style>
      body,
      html,
      iframe {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        border: none;
        overflow: hidden;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        transition: opacity 0.3s ease;
        user-select: none;
      }
      .overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #com {
        padding: 20px;
        text-align: center;
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="com_container" class="overlay">
      <span id="com">Starting...</span>
    </div>
    <iframe id="shinyFrame" src="about:blank"></iframe>
  </body>
  <script type="module" src="/main.js"></script>
</html>
